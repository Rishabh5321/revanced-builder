name: Repair Sync
on:
  workflow_run:
    workflows: ["Sync Upstream"]
    types:
      - completed

jobs:
  repair:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Repair main branch
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Detect upstream
          UPSTREAM_REPO=$(gh api repos/${{ github.repository }} --jq '.parent.full_name // .template_repository.full_name' 2>/dev/null || echo "")
          if [ "$UPSTREAM_REPO" = "null" ] || [ -z "$UPSTREAM_REPO" ]; then
            UPSTREAM_REPO="j-hc/revanced-magisk-module"
          fi
          
          # 2. Sync with upstream (drop local commits)
          git remote add upstream "https://github.com/$UPSTREAM_REPO"
          git fetch upstream main
          git reset --hard upstream/main

          # 3. Restore from config-backup
          git fetch origin config-backup
          git checkout origin/config-backup -- .
          
          # 4. Commit and push
          git add .
          git commit -m "Repair: sync with upstream and restore config-backup" || echo "No changes to commit"
          git push origin main --force
